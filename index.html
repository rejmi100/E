<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Školní nástěnka úkolů</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="bg-shapes">
        <div class="shape shape1"></div>
        <div class="shape shape2"></div>
        <div class="shape shape3"></div>
        <div class="shape shape4"></div>
    </div>

    <header class="header">
        <h1>školní nástěnka ukolů</h1>
        <div id="user-info" class="user-info" style="display: none;">
            <span id="user-email"></span>
            <button id="logout-btn" class="logout-btn">Odhlásit se</button>
        </div>
        <button id="goto-login-btn" class="logout-btn">Přihlásit se</button>
    </header>

    <main class="container" style="display: none;">
        <section class="left-panel">
            <form id="task-form">
                <input type="text" id="task-name" placeholder="Název úkolu..." required class="input-full">
                <div class="input-row">
                    <select id="task-subject" required class="input-half">
                        <option value="" disabled selected>Předmět</option>
                        <option value="Matematika">Matematika</option>
                        <option value="Český jazyk">Český jazyk</option>
                        <option value="Anglický jazyk">Anglický jazyk</option>
                        <option value="Fyzika">Fyzika</option>
                        <option value="Informatika">Informatika</option>
                        <option value="Dějepis">Dějepis</option>
                        <option value="Biologie">Biologie</option>
                        <option value="Zeměpis">Zeměpis</option>
                        <option value="Chemie">Chemie</option>
                    </select>
                    <input type="date" id="task-date" required class="input-half">
                </div>
                <div class="large-box">
                    <textarea id="task-desc" placeholder="Detailní popis úkolu..."></textarea>
                    <button type="submit" class="submit-btn">Přidat úkol</button>
                </div>
            </form>
        </section>
        
        <section class="right-panel">
            <div id="task-list" class="task-list">
                <!-- Úkoly se zde budou zobrazovat -->
    <script src="script.js"></script>
</body>
</html>
