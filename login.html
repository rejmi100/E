<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Přihlášení - Školní nástěnka</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="bg-shapes">
        <div class="shape shape1"></div>
        <div class="shape shape2"></div>
        <div class="shape shape3"></div>
        <div class="shape shape4"></div>
    </div>

    <!-- Login form -->
    <div class="login-wrapper">
        <div class="login-box" style="margin: 10vh auto;">
            <h2>Přístup na nástěnku</h2>
            <form id="auth-form" class="auth-form">
                <input type="text" id="auth-email" placeholder="E-mail nebo přihlašovací jméno" required class="input-full">
                <input type="password" id="auth-password" placeholder="Heslo" required class="input-full">
                <div class="auth-buttons">
                    <button type="submit" id="login-btn" class="submit-btn auth-btn">Přihlásit</button>
                    <button type="button" id="register-btn" class="submit-btn auth-btn sec-btn">Registrovat</button>
                </div>
                <p id="auth-error" class="auth-error"></p>
            </form>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
